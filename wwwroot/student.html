<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Information Card Page</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<!-- NavBar -->
<nav class="navbar navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
        <button class="navbar-toggler flex-shrink-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasDarkNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
    </div>
</nav>

<!-- Offcanvas moved outside nav so it isn't clipped by nav's fixed height -->
<div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="offcanvasDarkNavbar" style="z-index: 1055;">
    <div class="offcanvas-header">
        <button type="button" class="navbar-toggler" data-bs-dismiss="offcanvas">
            <span class="navbar-toggler-icon"></span>
        </button>
    </div>

    <div class="offcanvas-body">
        <ul class="navbar-nav justify-content-end flex-grow-1">
            <li class="nav-item">
                <a class="nav-link active" href="index.html">Search Student</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">Make Reports</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="index.html">Log Out</a>
            </li>
        </ul>
    </div>
</div>

<h2 id="studentTitle" style="padding-top: 150px; padding-left: 50px; color: rgb(0, 0, 0);">
    Loading...
</h2>

<div class="container" style="border: 2px solid black; margin-top: 70px; padding: 20px;">
    <div class="row align-items-start">
        <div class="col-12 col-md-auto ps-5 text-center mb-3 mb-md-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" fill="currentColor" class="bi bi-person-square" viewBox="0 0 16 16">
                <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
                <path d="M2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a1 1 0 0 0-1-1H2z"/>
            </svg>
        </div>

        <div class="col-6 col-md">
            <h4>Student ID:</h4>
            <h4>Email:</h4>
            <h4>Expected Graduation Year:</h4>
        </div>

        <div class="col-6 col-md">
            <h4 id="studentIdValue">-</h4>
            <h4 id="studentEmailValue">-</h4>
            <h4 id="studentGradValue">-</h4>
        </div>
    </div>

    <div class="row mt-3">
        <div class="col-12 col-md-auto text-md-end">
            <h3>Major:</h3>
        </div>

        <div class="col-12 col-md fw-bold">
            <h3 id="studentMajorValue">-</h3>
        </div>
    </div>

    <div class="row mt-2">
        <div class="col-12 col-sm-6">
            <h3>Course:</h3>
            <select class="form-select" aria-label="Course select">
                <option selected>Select</option>
            </select>
        </div>

        <div class="col-12 col-sm-6 mt-3 mt-sm-0">
            <h3>Semester:</h3>
            <select class="form-select" aria-label="Semester select">
                <option selected>Select</option>
            </select>
        </div>
    </div>

    <div class="scrollable container">
        <div style="max-height: 250px; overflow-y: scroll; border: 1px solid black; margin-top: 20px;">
            <table class="table table-bordered text-center mb-0">
                <thead>
                    <tr>
                        <th style="background-color: #d3d3d3;">Assignments</th>
                        <th style="background-color: #d3d3d3;">Rate</th>
                        <th style="background-color: #4da6ff;">PLO 1</th>
                        <th style="background-color: #4da6ff;">PLO 2</th>
                        <th style="background-color: #4da6ff;">PLO 3</th>
                        <th style="background-color: #4da6ff;">PLO 4</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>N/A</td>
                        <td>N/A</td>
                        <td><input type="checkbox" class="form-check-input" disabled></td>
                        <td><input type="checkbox" class="form-check-input" disabled></td>
                        <td><input type="checkbox" class="form-check-input" disabled></td>
                        <td><input type="checkbox" class="form-check-input" disabled></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-2">
            <button class="btn btn-secondary btn-sm">Add new assignments</button>
        </div>
    </div>
</div>

<footer style="padding: 20px"></footer>

<script>

    function getStudentIdFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return params.get('studentId');
    }

    $(document).ready(function () {
        const studentId = getStudentIdFromUrl();

	//error if doesn't have id
        if (!studentId) {
            alert('No student ID provided.');
            return;
        }

        // ask back end
        $.ajax({
            url: '/student/' + encodeURIComponent(studentId),
            method: 'GET',
            success: function (student) {
                $('#studentTitle').text(
                    (student.lastName ?? '') + ', ' + (student.firstName ?? '') + ' - [' + (student.status ?? 'Active') + ']'
                );

                $('#studentIdValue').text(student.studentID ?? '-');
                $('#studentEmailValue').text(student.email ?? 'N/A');
                $('#studentGradValue').text(student.expGradTerm ?? '-');
                $('#studentMajorValue').text(student.major ?? 'N/A');
            },
            error: function () {
                alert('Student not found.');
            }
        });
    });
</script>


</body>
</html>
