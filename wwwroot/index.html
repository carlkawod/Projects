<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />    
    <title>Student Portal</title>
    <link rel="stylesheet" href="styles.css?v=1" />

</head>
<body style ="background-color: #000000;">

    <!-- LOGIN PAGE -->
    <div id="loginScreen" class="screen active">
    <div class="login-wrapper">
    <div class="login-box">
        <br/>
    <div class="login-title">Login</div>
        <div class="user-icon"></div>
        <br/>

    <input class="login-input" type="text" placeholder="Username" id="username" /><br/><br/>
    <input class="login-input" type="password" placeholder="Password" id="password" /><br/><br/> 

    <div class="login-row">
        <label style="margin: auto;">
        <input type="checkbox" />
        Remember me
    </div>
    <br/>
        <button class="login-btn" onclick="goToSearch()">Login</button> 
      </div>
    </div>
    </div>



<script>
  // --- LOGIN LOGIC ---
  async function goToSearch() {
    const userField = document.getElementById("username").value;
    const passField = document.getElementById("password").value;

    try {
      // 1. Send the data to your C# API
      // Make sure this URL matches what your terminal printed out!
      const response = await fetch("http://localhost:5257/api/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          Username: userField,
          Password: passField
        })
      });

      // 2. Check the server's response
      if (response.ok) {
        const data = await response.json();
        
        // Save the token the server gave us
        sessionStorage.setItem("isLoggedIn", "true");
        sessionStorage.setItem("authToken", data.token);
        
        // Redirect to the portal
        window.location.href = "search.html";
      } else {
        alert("Invalid username or password. Please try again.");
      }
    } catch (error) {
      console.error("Error connecting to server:", error);
      alert("Could not connect to the login server.");
    }
  }
</script>

</body>
</html>
