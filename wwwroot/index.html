<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />    
    <title>Student Portal - Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        /* Custom styles for a beautiful, modern login screen */
        body {
            /* A professional dark blue gradient */
            background: linear-gradient(180deg, #B5A36A 0%, #000204 125%);
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border: none;
        }
        .user-icon-circle {
            width: 80px;
            height: 80px;
            background-color: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -40px auto 20px; /* Forces the circle to overlap the top of the card */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .input-group-text {
            background-color: #f8f9fa;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #2a5298;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4 mt-5">
                <div class="card login-card">
                    <div class="card-body p-4 text-center">
                        
                        <div class="user-icon-circle text-primary">
                          <img src="img/logo.webp" alt="Portal Logo" style="width: 100%; height: 100%; object-fit: contain; border-radius: 50%;">
                        </div>

                        <h3 class="mb-4 fw-bold" style="color: #333;">Login Portal</h3>

                        <div class="mb-3 text-start">
                            <label for="username" class="form-label text-muted fw-semibold" style="font-size: 0.9rem;">Username</label>
                            <div class="input-group">
                                <span class="input-group-text border-end-0"><i class="bi bi-person text-muted"></i></span>
                                <input type="text" class="form-control border-start-0" id="username" placeholder="Enter username">
                            </div>
                        </div>

                        <div class="mb-4 text-start">
                            <label for="password" class="form-label text-muted fw-semibold" style="font-size: 0.9rem;">Password</label>
                            <div class="input-group">
                                <span class="input-group-text border-end-0"><i class="bi bi-lock text-muted"></i></span>
                                <input type="password" class="form-control border-start-0" id="password" placeholder="Enter password">
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="rememberMe">
                                <label class="form-check-label text-muted" style="font-size: 0.85rem;" for="rememberMe">
                                    Remember me
                                </label>
                            </div>
                        </div>

                        <button class="btn btn-primary w-100 py-2 fw-bold" style="border-radius: 8px; background-color: #000; border: none;" onclick="goToSearch()">
                            Log In <i class="bi bi-box-arrow-in-right ms-1"></i>
                        </button>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
      // --- LOGIN LOGIC ---
      async function goToSearch() {
        const userField = document.getElementById("username").value;
        const passField = document.getElementById("password").value;

        try {
          // 1. Send the data to your C# API
          const response = await fetch("http://localhost:5257/api/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              Username: userField,
              Password: passField
            })
          });

          // 2. Check the server's response
          if (response.ok) {
            const data = await response.json();
            
            // Save the token the server gave us
            sessionStorage.setItem("isLoggedIn", "true");
            sessionStorage.setItem("authToken", data.token);
            
            // Redirect to the portal
            window.location.href = "search.html";
          } else {
            alert("Invalid username or password. Please try again.");
          }
        } catch (error) {
          console.error("Error connecting to server:", error);
          alert("Could not connect to the login server.");
        }
      }
    </script>
</body>
</html>
