<!DOCTYPE html>
<html lang="en">
<head>
    <script>
//
        // 1. Check if the user is logged in
        const isLoggedIn = sessionStorage.getItem("isLoggedIn");

        // 2. If they are NOT logged in, kick them back to the login page
        if (isLoggedIn !== "true") 
        {
            window.location.href = "index.html";
        }
    </script>
    
    <meta charset="UTF-8">
    <title>Student Report Search Page</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<nav class="navbar navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasDarkNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
    </div>
    <div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="offcanvasDarkNavbar">
        <div class="offcanvas-header">
            <button type="button" class="navbar-toggler" data-bs-dismiss="offcanvas">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
        <div class="offcanvas-body">
            <ul class="navbar-nav justify-content-end flex-grow-1">
                <li class="nav-item"><a class="nav-link" href="search.html">Search Student</a></li>
                <li class="nav-item"><a class="nav-link active" href="#">Make Reports</a></li>
                <li class="nav-item"><a class="nav-link" onclick="logOut()">Log Out</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5" style="padding-top: 60px; color: rgb(171, 171, 16);">
    <h2><span id="displayName">Make Report</span></h2>
</div>

<div class="container-fluid text-center" style="margin-top: 60px; border: 2px solid #555555; background-color: rgb(199, 196, 196);">
    <div class="row">
        <div class="col border-end border-dark">Last Name</div>
        <div class="col border-end border-dark">First Name</div>
        <div class="col border-end border-dark">ID</div>
    </div>
</div>

<div class="container-fluid text-center" style="margin-top: 5px;">
    <div class="row">
        <div class="col">
            <input id="lastNameInput" class="form-control form-control-lg border-dark border-2" type="text">
        </div>
        <div class="col">
            <input id="firstNameInput" class="form-control form-control-lg border-dark border-2" type="text">
        </div>
        <div class="col">
            <input id="idInput" class="form-control form-control-lg border-dark border-2" type="text">
        </div>
    </div>
</div>

<!-- Results Table -->
<div class="container-fluid" style="margin-top: 30px; margin-bottom: 120px;">
    <table class="table table-bordered table-striped" id="resultsTable" style="display:none; text-align: center;">
        <thead class="table-dark">
            <tr>
                <th>Student ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Year</th>
                <th>Expected Grad Year</th>
                <th style="width: 20%;">Action</th>
            </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
    </table>
    <p id="noResults" style="display:none; text-align:center; margin-top:20px;">No students found.</p>
</div>

<!-- Bottom Action Buttons -->
<div class="fixed-bottom d-flex justify-content-center gap-3 pb-4">
    <button type="button" class="btn btn-outline-secondary" id="searchBtn">Search</button>
</div>

<script>

    // ── Search ──────────────────────────────────────────────────────────────
    $('#searchBtn').on('click', function () {
        $.ajax({
            url: '/search',
            method: 'GET',
            data: {
                lastName:  $('#lastNameInput').val(),
                firstName: $('#firstNameInput').val(),
                id:        $('#idInput').val()
            },
            success: function (results) {
                $('#resultsBody').empty();
                if (results.length === 0) {
                    $('#resultsTable').hide();
                    $('#noResults').show();
                } else {
                    $('#noResults').hide();
                    $('#resultsTable').show();
                    results.forEach(function (student) {
                        var sid = String(student.StudentID);
                        $('#resultsBody').append(
                            '<tr>' +
                            '<td>' + sid + '</td>' +
                            '<td>' + student.FirstName + '</td>' +
                            '<td>' + student.LastName + '</td>' +
                            '<td>' + student.Year + '</td>' +
                            '<td>' + student.ExpectedGradYear + '</td>' +
                            '<td>' +
                                '<button class="btn btn-outline-secondary btn-sm" onclick="window.location.href=\'report.html?sid=' + student.StudentID + '\'">Go</button>' +
                            '</td>' +
                            '</tr>'
                        );
                    });
                }
            },
            error: function () {
                alert('Something went wrong. Make sure the server is running.');
            }
        });
    });

    function logOut() {
        const isSure = confirm("Are you sure you want to log out?");
        if (isSure) {
            sessionStorage.removeItem("isLoggedIn");
            window.location.replace("index.html");
        }
    }

</script>

</body>
</html>
